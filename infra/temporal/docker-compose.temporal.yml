version: "3.8"

services:
  temporal:
    image: temporalio/auto-setup:1.24
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-caa}
      - POSTGRES_PWD=${POSTGRES_PASSWORD:-caa_secret}
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    depends_on:
      - postgres
    networks:
      - caa-network

  temporal-ui:
    image: temporalio/ui:2.31.2
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000,http://localhost:80
    ports:
      - "8088:8080"
    depends_on:
      - temporal
    networks:
      - caa-network

networks:
  caa-network:
    external: true
    name: caa-network
