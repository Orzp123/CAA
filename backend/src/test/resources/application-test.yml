spring:
  config:
    import: ""   # override main application.yml nacos import — no Nacos in tests
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  cloud:
    nacos:
      config:
        enabled: false
      discovery:
        enabled: false
  autoconfigure:
    exclude:
      - com.alibaba.cloud.nacos.NacosConfigAutoConfiguration
      - com.alibaba.cloud.nacos.NacosServiceAutoConfiguration
      - org.springframework.ai.autoconfigure.vectorstore.redis.RedisVectorStoreAutoConfiguration
  kafka:
    bootstrap-servers: localhost:9092

# Doris secondary datasource — point to H2 in tests to avoid connection failures
doris:
  datasource:
    url: jdbc:h2:mem:doristestdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 2
  ai:
    openai:
      api-key: test-key
      chat:
        options:
          model: gpt-4o-mini
    anthropic:
      api-key: test-key
    vectorstore:
      redis:
        index: test-index

jwt:
  secret: test-secret-key-for-integration-tests-must-be-long-enough
  expiration-seconds: 3600

# Stub values so @Configuration classes don't fail on missing @Value bindings
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin

temporal:
  service-address: localhost:7233
  namespace: default
