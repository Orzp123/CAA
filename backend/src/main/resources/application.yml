spring:
  application:
    name: caa-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    # SCA 2025.1.0.0: bootstrap.yml replaced by spring.config.import
    import: "optional:nacos:caa-common.yaml"
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      config:
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        refresh-enabled: true
      discovery:
        enabled: true
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        register-enabled: true
        heart-beat-interval: 5000
        heart-beat-timeout: 15000

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:caa}?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:caa}
    password: ${MYSQL_PASSWORD:caa_secret}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      # C-1 fix: 锁定连接时区为 UTC，防止 DATETIME 时区漂移
      connection-init-sql: "SET time_zone='+00:00'"
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: caa-backend
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.caa.event

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o}
          temperature: 0.7
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: ${ANTHROPIC_MODEL:claude-opus-4-5}
          temperature: 0.7
    vectorstore:
      redis:
        index: caa-vectors
        prefix: "vec:"
        initialize-schema: true

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        # H-5 fix: 仅暴露 health/info，metrics/prometheus 须认证
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

temporal:
  service-url: ${TEMPORAL_HOST:localhost}:${TEMPORAL_PORT:7233}
  namespace: ${TEMPORAL_NAMESPACE:default}

# MinIO configuration
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ROOT_USER:minioadmin}
  secret-key: ${MINIO_ROOT_PASSWORD:minioadmin_secret}
  bucket-name: caa-files

# M-5 fix: SSO client_secret AES-GCM 加密密钥（生产环境通过环境变量注入，禁止明文提交）
# 警告：默认值仅用于本地开发，生产环境必须设置 APP_ENCRYPTION_SECRET 环境变量
app:
  encryption:
    secret: ${APP_ENCRYPTION_SECRET:dev-only-change-in-production-32c}
  cookie:
    secure: ${APP_COOKIE_SECURE:false}
  account:
    # H-4 fix: 默认密码通过环境变量注入，生产环境必须覆盖
    default-password: ${APP_ACCOUNT_DEFAULT_PASSWORD:Caa@2026}

# Doris analytics datasource
doris:
  datasource:
    url: jdbc:mysql://${DORIS_FE_HOST:localhost}:${DORIS_FE_PORT:9030}/caa_analytics?useUnicode=true&characterEncoding=utf8mb4&useSSL=false
    username: ${DORIS_USER:root}
    password: ${DORIS_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      connection-test-query: SELECT 1

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
    # H-2 fix: 非 dev 环境通过 profile 覆盖禁用，默认开启供开发使用
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    enabled: true
  show-actuator: false

logging:
  level:
    com.caa: INFO
    org.springframework.ai: DEBUG
