services:
  mysql:
    ports:
      - "3306:3306"

  redis:
    ports:
      - "6379:6379"

  kafka:
    ports:
      - "9092:9092"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    command: mvn spring-boot:run -Dspring-boot.run.profiles=dev
    volumes:
      - ./backend:/build
      - maven_cache:/root/.m2
    environment:
      SPRING_PROFILES_ACTIVE: dev
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: caa
      MYSQL_USER: caa
      MYSQL_PASSWORD: caa_secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_secret
      TEMPORAL_HOST: temporal
      TEMPORAL_PORT: 7233
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: deps
    command: pnpm dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      BACKEND_URL: http://backend:8080/api
      NODE_ENV: development
    ports:
      - "3000:3000"

volumes:
  maven_cache:
